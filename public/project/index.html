f","value":"/images/projects/wukong/wukong-boss-combat.gif"}],"description":"Dive headfirst into intense, action-packed battles in Myth of the Jade Monkey, an RPG inspired by the high-energy combat of Black Myth: Wukong's first trailer. Play as a fierce warrior armed with elemental powers, mastering fast, fluid combat techniques to conquer formidable, mythic foes.","image":"/images/projects/wukong/wukong-title-image.png","name":"Wukong Early Fan Made","slug":"wukong-early-fan-made","tags":["Unreal Engine","Personal"],"time":"2021"},{"content":[{"type":"video","value":"https://youtu.be/P0DJOXgHhxs"},{"type":"text","value":"This was my final assignment project for a class in my third year."},{"intro":"What I worked on:","items":["Levels and character management system.","Shooting combat.","Enemy AI.","Save load system.","Multiple game modes with different gameplay styles to choose from."],"type":"list"},{"type":"gif","value":"/images/projects/casual-shooter/cts-combat.gif"},{"type":"text","value":"Characters, weapons and enemies."},{"type":"image","value":"/images/projects/casual-shooter/cts-characters.png"},{"type":"image","value":"/images/projects/casual-shooter/cts-weapons.png"},{"type":"image","value":"/images/projects/casual-shooter/cts-enemies.png"}],"description":"Sharpen your reflexes in this fast-paced, top-down shooter for PC and mobile! Outsmart waves of enemies, navigate dynamic battlegrounds, and unleash tactical firepower as you blast through each level.","image":"/images/projects/casual-shooter/cts-banner.png","name":"Casual Topdown Shooter","slug":"casual-topdown-shooter","tags":["Unreal Engine","Personal"],"time":"2021"},{"content":[{"type":"video","value":"https://youtu.be/mfHQZCE7S80"},{"type":"text","value":"This was my university graduation project in my final year."},{"intro":"What I worked on:","items":["Roguelike combat.","Random rooms and upgrades system.","Enemy AI, trap system.","Save load system.","Event trigger, simple shop."],"type":"list
