    <p>Redirecting…</p><script type="application/json" id="projects-data">[{"content":[{"type":"text","value":"My first — and, as it turned out, only — Unity project, built as the final assignment for a second-year university course. I moved to Unreal Engine right after finishing it. Made purely for learning, so it contains some copyrighted art and audio and isn't intended for release."},{"type":"gif","value":"/images/projects/fake-knight/fake-knight-combat.gif"},{"intro":"What I worked on:","items":["Inventory and equipment with set bonuses.","Four enemy archetypes — melee, ranged, flying, and boss — built on a shared state machine that also drives the player.","Save/load with three save slots.","Quest system as proof of concept — all quests granted at start, completable in any order. Didn't have time to expand into a full questline."],"type":"list"},{"type":"text","value":"Full playthrough."},{"type":"video","value":"https://youtu.be/mY6sDiFHwwo"},{"type":"gif","value":"/images/projects/fake-knight/fake-knight-inventory.gif"},{"type":"text","value":"Honestly, the systems were over-scoped for a coursework deadline — the state machine alone ended up the heaviest piece of engineering. I came out of it having learned more about cutting scope than about combat feel."}],"description":"Fake Knight is a 2D action-combat adventure set in the Underneath, a forgotten realm fallen to monstrous foes. Explore winding tunnels, gear up with weapon and armor sets, take on quests from the survivors, and fight through melee, ranged, flying, and boss enemies to reclaim what was lost.","image":"/images/projects/fake-knight/fake-knight.png","main":{"type":"video","value":"https://youtu.be/3ZKLAST7Lec"},"name":"Fake Knight","slug":"fake-knight","tags":["Unity","Personal"],"time":"2020"},{"content":[{"type":"text","value":"First project after switching to Unreal Engine — mostly an exploration of how the engine fits together. I was impressed but overwhelmed at first by the sheer surface area of tools and features."},{"intro":"What I worked on:","items":["Basic action combat — nothing fancy, but it works end to end.","The full pipeline, all the way through to a packaged, playable demo."],"type":"list"},{"intro":"What I learnt:","items":["Unreal's gameplay framework, project workflow, and editor UI/UX."],"type":"list"},{"type":"text","value":"That last one is genuinely the hardest part of picking up Unreal — there's so much in front of you on day one (frameworks, editors, build pipelines, Blueprint vs C++) that I spent the first few weeks just figuring out where everything lived."},{"type":"gif","value":"/images/projects/wukong/wukong-enemies-combat.gif"},{"type":"gif","value":"/images/projects/wukong/wukong-boss-combat.gif"}],"description":"A fast-paced action RPG inspired by the first trailer of Black Myth: Wukong, set in a mythic realm of warring spirits and elemental power. Wield elemental abilities, chain fluid melee combos, dodge through danger, and clash with mythic bosses.","image":"/images/projects/wukong/wukong-title-image.png","main":{"type":"video","value":"https://youtu.be/ntYqUWGNy1c"},"name":"Wukong Early Fan Made","slug":"wukong-early-fan-made","tags":["Unreal Engine","Personal"],"time":"2021"},{"content":[{"type":"text","value":"Third-year university coursework, designed for both PC and mobile. I kept the scope deliberately small after Fake Knight — single-genre, finite content, finishable in a semester."},{"intro":"What I worked on:","items":["Top-down shooting combat.","Level flow and character management.","Enemy AI across a few different archetypes.","Save/load between sessions.","Three game modes — defeat all enemies, reach a target location, or survive over a set duration."],"type":"list"},{"intro":"What I learnt:","items":["Mobile is its own kind of complexity — input, performance, screen sizes, packaging."],"type":"list"},{"type":"text","value":"A lot of those constraints only show up once you're testing on-device or building the final package. If you haven't accounted for them from day one, you end up redoing whole systems."},{"type":"gif","value":"/images/projects/casual-shooter/cts-combat.gif"},{"type":"text","value":"Design of all characters, weapons, and enemies in the game."},{"type":"image","value":"/images/projects/casual-shooter/cts-characters.png"},{"type":"image","value":"/images/projects/casual-shooter/cts-weapons.png"},{"type":"image","value":"/images/projects/casual-shooter/cts-enemies.png"}],"description":"A fast-paced arcade top-down shooter for PC and mobile, set across dynamic battlegrounds built for quick sessions. Outsmart enemy waves, dodge incoming fire, unleash tactical firepower, and tackle three different game modes.","image":"/images/projects/casual-shooter/cts-banner.png","main":{"type":"video","value":"https://youtu.be/P0DJOXgHhxs"},"name":"Casual Topdown Shooter","slug":"casual-topdown-shooter","tags":["Unreal Engine","Personal"],"time":"2021"},{"content":[{"type":"text","value":"Final-year university graduation project. By this point I'd switched to Unreal and finished a couple of smaller projects, so I wanted to try something with more replay value — hence the roguelike loop."},{"intro":"What I worked on:","items":["Roguelike combat — dodge, dash, melee, and abilities.","Procedural rooms and an upgrade system.","Enemy AI and environmental traps.","Save/load.","Event triggers and a simple in-run shop."],"type":"list"},{"type":"text","value":"Full gameplay."},{"type":"video","value":"https://youtu.be/8IbrqM4H0rg"},{"type":"image","value":"/images/projects/action-roguelike/ar-combat-2.png"},{"type":"gif","value":"/images/projects/action-roguelike/ar-combat.gif"}],"description":"A fast, run-based action game set across ever-shifting procedural rooms where one misstep ends the run. Dodge, dash, slash through enemy waves, grab upgrades between rooms, and push deeper with each attempt.","image":"/images/projects/action-roguelike/ar-banner.png","main":{"type":"video","value":"https://youtu.be/mfHQZCE7S80"},"name":"Action Roguelike","slug":"action-roguelike","tags":["Unreal Engine","Personal"],"time":"2022-2023"},{"content":[{"intro":"What I worked on:","items":["Sandbox metaverse game with in-game builder tool and world-sharing feature.","Base building and shooter gameplay.","Debugged, profiled and optimized CPU and GPU performance to ensure a smooth experience for players.","Reviewed and refined game logic, addressed and resolved technical issues.","Customized and extended third-party, existing systems to align with project requirements."],"type":"list"},{"type":"text","value":"Small early gameplay."},{"type":"video","value":"https://www.youtube.com/watch?v=rSpk9f4pZWM"},{"type":"image","value":"/images/projects/deverse-world/dv-library-hero.png"},{"type":"gif","value":"/images/projects/deverse-world/dv-gameplay.png"}],"description":"Deverse World is a sandbox RPG fusing RTS, shooter, and base-building, set across infinite floating isles shaped by procedural generation. Gather resources, build strongholds, raid rival bases, and explore the skies with friends.","image":"/images/projects/deverse-world/dv-banner.png","main":{"type":"video","value":"https://www.youtube.com/watch?v=5_RaYynq8PY"},"name":"Deverse World","slug":"deverse-world","tags":["Unreal Engine","Work"],"time":"2022 - 2025"}]</script>
