# Project data for the portfolio.
#
# Schema:
#   slug:        URL-friendly id (reserved for Phase 7 per-project pages)
#   name:        display name
#   image:       hero/card image path
#   tags:        list of tag strings (canonical: Unity, Unreal Engine, Personal, Work, Prototype)
#   time:        free-text date/range
#   description: short paragraph shown on the detail card
#   content:     ordered list of body blocks, each with a `type`:
#                  text  -> { type: text,  value: "..." }
#                  list  -> { type: list,  intro: "...", items: ["...", "..."] }
#                  image -> { type: image, value: "/path/img.png" }
#                  gif   -> { type: gif,   value: "/path/anim.gif" }
#                  video -> { type: video, value: "https://youtu.be/..." }

- slug: fake-knight
  name: "Fake Knight"
  image: /images/projects/fake-knight/fake-knight.png
  tags: [Unity, Personal]
  time: "2020"
  description: "Embark on an epic adventure in Fake Knight, an action-packed, combat-driven journey inspired by the beloved Hollow Knight. Do you have the courage and skill to overcome relentless foes and liberate the Underneath from impending doom?"
  content:
    - type: video
      value: "https://youtu.be/3ZKLAST7Lec"
    - type: text
      value: "First project I completed using Unity engine, and possibly the last one as well because I switched to Unreal Engine right after this. This project was made purely for learning purposes and, therefore, contains many copyrighted resources."
    - type: text
      value: "This was my final assignment project for a class in my second year."
    - type: list
      intro: "What I worked on:"
      items:
        - "Inventory and equipment system with set effects."
        - "Enemy systems featuring four types of enemies: melee, ranged, flying and boss."
        - "Player and AI state machine."
        - "Save, load system with 3 save slots for player to choose from."
        - "Quest system."
    - type: text
      value: "Full gameplay."
    - type: video
      value: "https://youtu.be/mY6sDiFHwwo"
    - type: gif
      value: /images/projects/fake-knight/fake-knight-combat.gif
    - type: gif
      value: /images/projects/fake-knight/fake-knight-inventory.gif

- slug: wukong-early-fan-made
  name: "Wukong Early Fan Made"
  image: /images/projects/wukong/wukong-title-image.png
  tags: [Unreal Engine, Personal]
  time: "2021"
  description: "Dive headfirst into intense, action-packed battles in Myth of the Jade Monkey, an RPG inspired by the high-energy combat of Black Myth: Wukong's first trailer. Play as a fierce warrior armed with elemental powers, mastering fast, fluid combat techniques to conquer formidable, mythic foes."
  content:
