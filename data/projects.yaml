    - type: text
      value: "First project after switching to Unreal Engine. I tried to mess around with the framework and see how everything works together. To be honest, I was impressed but also overwhelmed at first by all the tools and features in front of me."
    - type: list
      intro: "What I worked on:"
      items:
        - "Combat system."
        - "Environment creation tools."
        - "Enemy AI."
