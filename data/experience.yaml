# Career timeline data — rendered by layouts/partials/timeline.html.
# Order in this file doesn't matter; bars are placed by date.
#
# Fields:
#   role        Title shown on the bar.
#   company     Company shown on the bar.
#   lane        "primary" (employment) or "side" (overlapping side/contract/personal work).
#   start       "YYYY-MM" e.g. "2024-01"
#   end         "YYYY-MM" or "present"
#   location    Free text, shown in the detail panel.
#   type        Full-time | Contract | Part-time | Internship | Self-employed
#   summary     One-line headline for the detail panel.
#   highlights  (optional) Bullets in the detail panel.
#   tech        (optional) Tech tag chips.
#   ongoing     (optional) true = open-ended role. Bar fades to transparent on
#               the right; panel uses the orange left-rail "ongoing" treatment;
#               the date range renders "Jun 2026 – ● Ongoing" instead of an end
#               date. The yaml `end:` is still used to scale the timeline axis.

